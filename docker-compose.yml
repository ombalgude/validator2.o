version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: authenticity-validator-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: authenticity-validator
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - authenticity-network

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authenticity-validator-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/authenticity-validator?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 5000
      AI_SERVICE_URL: http://ai-services:8000
      MAX_FILE_SIZE: 10485760
      UPLOAD_PATH: /app/uploads
      FRONTEND_URL: http://localhost:3000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
      - ai-services
    networks:
      - authenticity-network

  # AI Services (Python)
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: authenticity-validator-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
    volumes:
      - ai_uploads:/app/uploads
    networks:
      - authenticity-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: authenticity-validator-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_AI_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - authenticity-network

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    container_name: authenticity-validator-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - authenticity-network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: authenticity-validator-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - ai-services
    networks:
      - authenticity-network

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  ai_uploads:
    driver: local
  redis_data:
    driver: local

networks:
  authenticity-network:
    driver: bridge